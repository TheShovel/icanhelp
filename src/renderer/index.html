<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>icanhelp</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="app">
            <div id="chat-panel" class="hidden">
                <div id="chat-panel-header">
                    <span id="chat-panel-title">Chat</span>
                    <select id="chat-model" title="Model"></select>
                    <select id="chat-effort" title="Reasoning effort">
                        <option value="">Auto</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button
                        id="burger-btn"
                        class="btn-icon"
                        title="Menu"
                    ></button>
                </div>
                <div id="burger-menu" class="hidden">
                    <button class="burger-item" data-action="new-chat"></button>
                    <button
                        class="burger-item"
                        data-action="chat-history"
                    ></button>
                    <button class="burger-item" data-action="settings"></button>
                    <div class="burger-separator"></div>
                    <button class="burger-item" data-action="quit"></button>
                </div>
                <div id="vision-progress" class="hidden">
                    <div id="vision-progress-bar">
                        <div id="vision-progress-fill"></div>
                    </div>
                    <span id="vision-progress-label"
                        >Downloading vision model...</span
                    >
                    <span id="vision-progress-pct"></span>
                </div>
                <div id="chat-messages"></div>
                <div id="typing-indicator" class="hidden">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <div id="chat-input-area">
                    <button
                        id="attach-btn"
                        class="btn-icon"
                        title="Attach a file"
                    ></button>
                    <div id="attachment-preview" class="hidden">
                        <span id="attachment-name"></span>
                        <button
                            id="remove-attachment"
                            class="btn-icon"
                            title="Remove attachment"
                        ></button>
                    </div>
                    <input
                        type="text"
                        id="chat-input"
                        placeholder="Ask me anything..."
                    />

                    <button
                        id="send-btn"
                        class="btn-icon"
                        title="Send"
                    ></button>
                    <button
                        id="cancel-btn"
                        class="btn-icon hidden"
                        title="Cancel"
                    ></button>
                </div>
                <div id="attach-menu" class="hidden">
                    <button class="attach-menu-item" data-action="file">
                        File from computer
                    </button>
                    <button class="attach-menu-item" data-action="screenshot">
                        Screenshot
                    </button>
                </div>
            </div>

            <div id="chat-list-panel" class="hidden">
                <div id="chat-list-header">
                    <span>Chat History</span>
                    <button
                        id="close-chat-list"
                        class="btn-icon"
                        title="Close"
                    ></button>
                </div>
                <div id="chat-list-body"></div>
            </div>

            <div id="settings-menu-panel" class="hidden">
                <div id="settings-menu-header">
                    <span>Settings</span>
                    <button
                        id="close-settings-menu"
                        class="btn-icon"
                        title="Back"
                    ></button>
                </div>
                <div id="settings-menu-body">
                    <button class="settings-menu-item" data-action="provider">
                        <span>Provider</span>
                        <span class="settings-menu-hint"
                            >LLM configuration</span
                        >
                    </button>
                    <button class="settings-menu-item" data-action="theme">
                        <span>Theme</span>
                        <span class="settings-menu-hint"
                            >Customize appearance</span
                        >
                    </button>
                    <div class="settings-menu-separator"></div>
                    <button
                        class="settings-menu-item settings-menu-item-danger"
                        data-action="reset"
                    >
                        <span>Reset All Data</span>
                        <span class="settings-menu-hint"
                            >Wipe config, models, knowledge base, and
                            chats</span
                        >
                    </button>
                </div>
            </div>

            <div id="theme-panel" class="hidden">
                <div id="theme-header">
                    <span>Theme</span>
                    <button
                        id="close-theme"
                        class="btn-icon"
                        title="Back to settings"
                    ></button>
                </div>
                <div id="theme-body">
                    <p id="theme-status">
                        Select a saved theme or ask the AI to create one.
                    </p>
                    <div id="theme-list"></div>
                    <button id="theme-reset" class="btn-primary">
                        Reset to Default
                    </button>
                </div>
            </div>

            <div id="setup-panel" class="hidden">
                <div id="setup-header">
                    <span>Configure LLM Provider</span>
                    <button
                        id="close-setup"
                        class="btn-icon"
                        title="Back to chat"
                    ></button>
                </div>
                <div id="setup-body">
                    <label>
                        Provider
                        <select id="setup-provider">
                            <option value="local">Local (built-in)</option>
                            <option value="ollama">Ollama</option>
                        </select>
                    </label>
                    <label id="setup-key-label" class="hidden">
                        API Key
                        <input
                            type="password"
                            id="setup-key"
                            placeholder="sk-or-v1-..."
                        />
                    </label>
                    <label id="setup-endpoint-label" class="hidden">
                        Endpoint URL
                        <input
                            type="text"
                            id="setup-endpoint"
                            placeholder="http://localhost:11434/v1"
                        />
                    </label>
                    <label id="setup-model-label" class="hidden">
                        Model
                        <select id="setup-model">
                            <option value="">
                                — enter API key to load models —
                            </option>
                        </select>
                    </label>
                    <div id="setup-local-config" class="hidden">
                        <label>
                            Model File
                            <input
                                type="text"
                                id="setup-model-path"
                                placeholder="~/.cache/icanhelp/models/model.gguf"
                            />
                        </label>
                        <label id="setup-context-size-label">
                            Context Size
                            <input
                                type="number"
                                id="setup-context-size"
                                value="4096"
                                min="512"
                                max="32768"
                                step="512"
                            />
                        </label>
                        <div id="setup-download-section">
                            <p id="setup-download-title">Download a model</p>
                            <div id="setup-download-list"></div>
                            <div id="setup-download-progress" class="hidden">
                                <div id="setup-download-bar">
                                    <div id="setup-download-fill"></div>
                                </div>
                                <span id="setup-download-pct"></span>
                            </div>
                        </div>
                    </div>
                    <button id="setup-save" class="btn-primary">
                        Save &amp; Start
                    </button>
                    <p id="setup-status"></p>
                </div>
            </div>

            <div id="avatar" title="Click to ask me anything">
                <img id="avatar-inner" src="" alt="" draggable="false" />
            </div>

            <div id="sudo-overlay" class="hidden">
                <div id="sudo-dialog">
                    <div id="sudo-header">
                        <span>Authentication Required</span>
                    </div>
                    <div id="sudo-body">
                        <p id="sudo-message">sudo requires your password</p>
                        <input
                            type="password"
                            id="sudo-input"
                            placeholder="Password..."
                        />
                        <div id="sudo-actions">
                            <button id="sudo-cancel" class="btn-secondary">
                                Cancel
                            </button>
                            <button id="sudo-submit" class="btn-primary">
                                Submit
                            </button>
                        </div>
                        <p id="sudo-status"></p>
                    </div>
                </div>
            </div>

            <div id="confirm-overlay" class="hidden">
                <div id="confirm-dialog">
                    <div id="confirm-header">
                        <span>Confirm Command</span>
                    </div>
                    <div id="confirm-body">
                        <p id="confirm-message">Run the following command?</p>
                        <pre id="confirm-command"></pre>
                        <div id="confirm-actions">
                            <button id="confirm-no" class="btn-secondary">
                                Cancel
                            </button>
                            <button id="confirm-yes" class="btn-primary">
                                Run
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="icons.js"></script>
        <script src="renderer.js"></script>
    </body>
</html>
