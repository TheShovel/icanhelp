<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>icanhelp</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="app">
            <div id="chat-panel" class="hidden">
                <div id="chat-messages"></div>
                <div id="typing-indicator" class="hidden">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <div id="chat-input-area">
                    <input
                        type="text"
                        id="chat-input"
                        placeholder="Ask me anything..."
                    />
                    <select id="chat-effort" title="Reasoning effort">
                        <option value="">Auto</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button id="chat-list-btn" class="btn-icon" title="Chat history"></button>
                    <button id="new-chat-btn" class="btn-icon" title="New chat"></button>
                    <button id="send-btn" class="btn-icon" title="Send"></button>
                    <button id="cancel-btn" class="btn-icon hidden" title="Cancel"></button>
                </div>
            </div>

            <div id="chat-list-panel" class="hidden">
                <div id="chat-list-header">
                    <span>Chat History</span>
                    <button id="close-chat-list" class="btn-icon" title="Close"></button>
                </div>
                <div id="chat-list-body"></div>
            </div>

            <div id="setup-panel" class="hidden">
                <div id="setup-header">
                    <span>Configure LLM Provider</span>
                    <button id="close-setup" class="btn-icon" title="Back to chat"></button>
                </div>
                <div id="setup-body">
                    <label>
                        Provider
                        <select id="setup-provider">
                            <option value="openrouter">OpenRouter</option>
                            <option value="openai">OpenAI</option>
                            <option value="ollama">Ollama (local)</option>
                            <option value="opencode">OpenCode</option>
                        </select>
                    </label>
                    <label>
                        API Key
                        <input
                            type="password"
                            id="setup-key"
                            placeholder="sk-or-v1-..."
                        />
                    </label>
                    <label>
                        Endpoint URL
                        <input
                            type="text"
                            id="setup-endpoint"
                            placeholder="https://openrouter.ai/api/v1"
                        />
                    </label>
                    <label>
                        Model
                        <select id="setup-model">
                            <option value="">— enter API key to load models —</option>
                        </select>
                    </label>
                    <button id="setup-save" class="btn-primary">
                        Save &amp; Start
                    </button>
                    <p id="setup-status"></p>
                </div>
            </div>

            <div id="avatar" title="Click to ask me anything">
                <img id="avatar-inner" src="" alt="" draggable="false" />
            </div>

            <div id="sudo-overlay" class="hidden">
                <div id="sudo-dialog">
                    <div id="sudo-header">
                        <span>Authentication Required</span>
                    </div>
                    <div id="sudo-body">
                        <p id="sudo-message">sudo requires your password</p>
                        <input
                            type="password"
                            id="sudo-input"
                            placeholder="Password..."
                        />
                        <div id="sudo-actions">
                            <button id="sudo-cancel" class="btn-secondary">Cancel</button>
                            <button id="sudo-submit" class="btn-primary">Submit</button>
                        </div>
                        <p id="sudo-status"></p>
                    </div>
                </div>
            </div>

            <div id="confirm-overlay" class="hidden">
                <div id="confirm-dialog">
                    <div id="confirm-header">
                        <span>Confirm Command</span>
                    </div>
                    <div id="confirm-body">
                        <p id="confirm-message">Run the following command?</p>
                        <pre id="confirm-command"></pre>
                        <div id="confirm-actions">
                            <button id="confirm-no" class="btn-secondary">Cancel</button>
                            <button id="confirm-yes" class="btn-primary">Run</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="icons.js"></script>
        <script src="renderer.js"></script>
    </body>
</html>
