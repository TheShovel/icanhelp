<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>icanhelp</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="app">
            <div id="chat-panel" class="hidden">
                <div id="chat-header">
                    <span id="assistant-name">✨ icanhelp</span>
                    <select id="chat-effort" title="Reasoning effort">
                        <option value="">🧠 Auto</option>
                        <option value="low">🧠 Low</option>
                        <option value="medium">🧠 Medium</option>
                        <option value="high">🧠 High</option>
                    </select>
                    <button id="chat-settings" class="btn-icon" title="Settings">⚙️</button>
                    <button id="close-chat" class="btn-icon">✕</button>
                </div>
                <div id="chat-messages">
                    <div class="message assistant">
                        <div class="bubble">
                            Hi, I'm icanhelp. Ask me anything or tell me what
                            to do.
                        </div>
                    </div>
                </div>
                <div id="typing-indicator" class="hidden">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <div id="chat-input-area">
                    <input
                        type="text"
                        id="chat-input"
                        placeholder="Ask me anything..."
                    />
                    <button id="send-btn" class="btn-icon">➤</button>
                </div>
            </div>

            <div id="setup-panel" class="hidden">
                <div id="setup-header">
                    <span>Configure LLM Provider</span>
                    <button id="close-setup" class="btn-icon" title="Back to chat">✕</button>
                </div>
                <div id="setup-body">
                    <label>
                        Provider
                        <select id="setup-provider">
                            <option value="openrouter">OpenRouter</option>
                            <option value="openai">OpenAI</option>
                            <option value="ollama">Ollama (local)</option>
                            <option value="opencode">OpenCode</option>
                        </select>
                    </label>
                    <label>
                        API Key
                        <input
                            type="password"
                            id="setup-key"
                            placeholder="sk-or-v1-..."
                        />
                    </label>
                    <label>
                        Endpoint URL
                        <input
                            type="text"
                            id="setup-endpoint"
                            placeholder="https://openrouter.ai/api/v1"
                        />
                    </label>
                    <label>
                        Model
                        <select id="setup-model">
                            <option value="">— enter API key to load models —</option>
                        </select>
                    <button id="setup-save" class="btn-primary">
                        Save &amp; Start
                    </button>
                    <p id="setup-status"></p>
                </div>
            </div>

            <div id="avatar" title="Click to ask me anything">
                <div id="avatar-glow"></div>
                <div id="avatar-inner">✨</div>
            </div>
        </div>
        <script src="renderer.js"></script>
    </body>
</html>
